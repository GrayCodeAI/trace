# Canonical release workflow for hawk-eco Go binary repos.
# Triggered by release-please when it pushes a v* tag.
# Source of truth: .shared-templates/workflows/go-release.yml.tmpl

name: release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write
  packages: write
  id-token: write   # for cosign keyless signing if enabled later

jobs:
  goreleaser:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   # goreleaser needs full history for changelog

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.26.3"
          cache: true

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v6
        with:
          distribution: goreleaser
          version: "~> v2"
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Optional secrets used by some repos' goreleaser configs:
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          TAP_GITHUB_TOKEN: ${{ secrets.TAP_GITHUB_TOKEN }}
