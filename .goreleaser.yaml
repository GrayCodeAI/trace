# yaml-language-server: $schema=https://goreleaser.com/static/schema-pro.json
version: 2
pro: true

before:
  hooks:
    - go mod tidy
    - mise run completions

builds:
  - main: ./cmd/trace
    binary: trace
    env:
      - CGO_ENABLED=0
    goos:
      - darwin
      - linux
      - windows
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w
      - -X github.com/GrayCodeAI/trace/cmd/trace/cli/versioninfo.Version={{.Version}}
      - -X github.com/GrayCodeAI/trace/cmd/trace/cli/versioninfo.Commit={{.ShortCommit}}
      - -X github.com/GrayCodeAI/trace/cmd/trace/cli/telemetry.PostHogAPIKey={{.Env.POSTHOG_API_KEY}}
      - -X github.com/GrayCodeAI/trace/cmd/trace/cli/telemetry.PostHogEndpoint={{.Env.POSTHOG_ENDPOINT}}

notarize:
  macos:
    - enabled: '{{ isEnvSet "MACOS_SIGN_P12" }}'
      sign:
        certificate: "{{.Env.MACOS_SIGN_P12}}"
        password: "{{.Env.MACOS_SIGN_PASSWORD}}"
      notarize:
        issuer_id: "{{.Env.MACOS_NOTARY_ISSUER_ID}}"
        key_id: "{{.Env.MACOS_NOTARY_KEY_ID}}"
        key: "{{.Env.MACOS_NOTARY_KEY}}"
        wait: true # do not let an unusable binary slip into the wild

archives:
  - formats:
      - tar.gz
    format_overrides:
      - goos: windows
        formats:
          - zip
    name_template: "trace_{{ .Os }}_{{ .Arch }}"
    files:
      - src: completions/*
        info:
          owner: root
          group: root
          mtime: "{{ .CommitDate }}"
      - src: LICENSE
        info:
          owner: root
          group: root
          mtime: "{{ .CommitDate }}"
      - src: README.md
        info:
          owner: root
          group: root
          mtime: "{{ .CommitDate }}"

checksum:
  name_template: "checksums.txt"

release:
  prerelease: auto

scoops:
  - repository:
      owner: GrayCodeAI
      name: scoop-bucket
      token: "{{ .Env.TAP_GITHUB_TOKEN }}"
    homepage: "https://github.com/GrayCodeAI/trace"
    description: "CLI for Trace"
    license: MIT
    skip_upload: auto

homebrew_casks:
  - name: trace
    repository:
      owner: GrayCodeAI
      name: homebrew-tap
      token: "{{ .Env.TAP_GITHUB_TOKEN }}"
    directory: Casks
    homepage: "https://github.com/GrayCodeAI/trace"
    description: "CLI for Trace"
    binaries:
      - trace
    generate_completions_from_executable:
      executable: trace
      shell_parameter_format: cobra
      shells:
        - bash
        - zsh
        - fish
    conflicts:
      - cask: trace@nightly
    skip_upload: auto

  - name: trace@nightly
    repository:
      owner: GrayCodeAI
      name: homebrew-tap
      token: "{{ .Env.TAP_GITHUB_TOKEN }}"
    directory: Casks
    homepage: "https://github.com/GrayCodeAI/trace"
    description: "CLI for Trace (nightly build)"
    binaries:
      - trace
    generate_completions_from_executable:
      executable: trace
      shell_parameter_format: cobra
      shells:
        - bash
        - zsh
        - fish
    conflicts:
      - cask: trace
    skip_upload: "{{ if not .Prerelease }}true{{ end }}"

announce:
  discord:
    enabled: '{{ and (not .Prerelease) (isEnvSet "DISCORD_WEBHOOK_ID") (isEnvSet "DISCORD_WEBHOOK_TOKEN") }}'
    message_template: "Beep, boop. **Trace CLI {{ .Tag }}** is out!\n\n{{ .ReleaseURL }}\n\nSee https://docs.trace.io/cli/installation for help installing and updating."
    author: "Trace"
